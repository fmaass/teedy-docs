name: Build and Publish

on:
  push:
    branches: [main, "release/**", "fix/**"]
    tags: [v*]
  pull_request:
    branches: [main, "release/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get -y -q --no-install-recommends install ffmpeg mediainfo tesseract-ocr tesseract-ocr-deu

      - name: Check db.version covers latest migration
        run: bash scripts/check-db-version.sh

      - name: Run tests
        run: ./mvnw --batch-mode test

  test-postgres:
    # Run the docs-core suite (DbOpenHelper migration bootstrap + DAO/native-query tests)
    # against a real PostgreSQL 17, catching the H2-passes/Postgres-fails class of bug
    # (native-SQL column typos, case-sensitivity, migration statements) that H2 cannot.
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: docs
          POSTGRES_PASSWORD: docs
          POSTGRES_DB: docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get -y -q --no-install-recommends install ffmpeg mediainfo tesseract-ocr tesseract-ocr-deu

      - name: Point docs-core tests at PostgreSQL
        run: |
          cat > docs-core/src/test/resources/hibernate.properties <<'PROPS'
          hibernate.connection.driver_class=org.postgresql.Driver
          hibernate.connection.url=jdbc:postgresql://localhost:5432/docs
          hibernate.connection.username=docs
          hibernate.connection.password=docs
          hibernate.hbm2ddl.auto=
          hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
          hibernate.show_sql=false
          hibernate.format_sql=false
          hibernate.max_fetch_depth=5
          hibernate.cache.use_second_level_cache=false
          hibernate.connection.initial_pool_size=1
          hibernate.connection.pool_size=10
          hibernate.connection.pool_validation_interval=5
          PROPS

      - name: Run docs-core tests on PostgreSQL
        run: ./mvnw --batch-mode test -pl docs-core

  docs-importer:
    # Smoke-check the standalone Node.js bulk importer: install from the
    # lockfile and verify the entry parses and its dependencies still resolve
    # after the request -> fetch migration (ADR-0007 / RR-56).
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install importer dependencies
        run: cd docs-importer && npm ci

      - name: Smoke-test importer
        run: cd docs-importer && npm test

  build:
    runs-on: ubuntu-latest
    needs: [test, test-postgres]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Check version consistency (tag == pom == package.json)
        if: startsWith(github.ref, 'refs/tags/v')
        run: bash scripts/check-version-consistency.sh "${GITHUB_REF_NAME}"

      - name: Install frontend dependencies
        run: cd docs-web/src/main/webapp && npm ci

      - name: Check i18n key parity
        run: cd docs-web/src/main/webapp && npm run i18n:check

      - name: Lint frontend (i18n no-raw-text)
        run: cd docs-web/src/main/webapp && npm run lint

      - name: Run frontend unit tests
        run: cd docs-web/src/main/webapp && npm run test:unit

      - name: Build with Maven
        run: ./mvnw --batch-mode -Pprod clean install -DskipTests

      - name: Upload war artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: docs-web.war
          path: docs-web/target/docs*.war

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    # Publish images only from publishable refs; never build/push on PRs or fix/** branches.
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' ||
       startsWith(github.ref, 'refs/heads/release/') ||
       startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download war artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: docs-web.war
          path: docs-web/target

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value={{branch}}-rc-{{sha}},enable=${{ startsWith(github.ref, 'refs/heads/release/') }}

      # Runtime smoke test: build a single-arch amd64 image, load it into the local
      # Docker daemon, boot the container standalone (embedded H2 — no DATABASE_URL),
      # and assert a real API route serves. Catches a green build that produces an
      # image that cannot actually start or serve (broken WAR, bad Jetty wiring,
      # missing runtime dep). Buildx layer cache is reused by the multi-arch push below.
      - name: Build smoke-test image (amd64, load)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: teedy-smoke-test:local

      - name: Smoke-test the container
        run: bash scripts/docker-smoke-test.sh teedy-smoke-test:local

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
