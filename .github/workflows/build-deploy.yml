name: Build and Publish

on:
  push:
    branches: [main, "release/**", "fix/**"]
    tags: [v*]
  pull_request:
    branches: [main, "release/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get -y -q --no-install-recommends install ffmpeg mediainfo tesseract-ocr tesseract-ocr-deu

      - name: Check db.version covers latest migration
        run: bash scripts/check-db-version.sh

      # Determinism of the previously observation-timing-fragile tests is restored by the AppContext
      # per-test lifecycle fix (one deterministic AppContext per test, no late teardown/recreation) —
      # see #101/#102. No quarantine tag or retry is needed; the full suite gates cleanly on H2.
      - name: Run tests
        run: ./mvnw --batch-mode test

  test-postgres:
    # Run the docs-core suite (DbOpenHelper migration bootstrap + DAO/native-query tests)
    # against a real PostgreSQL 17, catching the H2-passes/Postgres-fails class of bug
    # (native-SQL column typos, case-sensitivity, migration statements) that H2 cannot.
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: docs
          POSTGRES_PASSWORD: docs
          POSTGRES_DB: docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get -y -q --no-install-recommends install ffmpeg mediainfo tesseract-ocr tesseract-ocr-deu

      - name: Point docs-core tests at PostgreSQL
        run: |
          cat > docs-core/src/test/resources/hibernate.properties <<'PROPS'
          hibernate.connection.driver_class=org.postgresql.Driver
          hibernate.connection.url=jdbc:postgresql://localhost:5432/docs
          hibernate.connection.username=docs
          hibernate.connection.password=docs
          hibernate.hbm2ddl.auto=
          hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
          hibernate.show_sql=false
          hibernate.format_sql=false
          hibernate.max_fetch_depth=5
          hibernate.cache.use_second_level_cache=false
          hibernate.connection.initial_pool_size=1
          hibernate.connection.pool_size=10
          hibernate.connection.pool_validation_interval=5
          PROPS

      - name: Run docs-core tests on PostgreSQL
        run: ./mvnw --batch-mode test -pl docs-core

  test-web-postgres:
    # Run the docs-web REST integration suite (real Grizzly HTTP server + Jersey,
    # every request COMMITS) against a real PostgreSQL 17 (R-032 / RR-12). H2-only
    # coverage cannot catch native-SQL/dialect bugs that only surface on Postgres in
    # the full request path. Seed-preserving per-class reset is handled by
    # PostgresSchemaResetExtension (ADR-0009): it DROP/CREATEs the public schema
    # before each test class so the migrations re-seed a fresh, fully-seeded DB with
    # no cross-class leakage. The fixed Jersey port (9998) is fine for this single
    # sequential run.
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: docs
          POSTGRES_PASSWORD: docs
          POSTGRES_DB: docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get -y -q --no-install-recommends install ffmpeg mediainfo tesseract-ocr tesseract-ocr-deu

      - name: Point docs-web tests at PostgreSQL
        run: |
          cat > docs-web/src/test/resources/hibernate.properties <<'PROPS'
          hibernate.connection.driver_class=org.postgresql.Driver
          hibernate.connection.url=jdbc:postgresql://localhost:5432/docs
          hibernate.connection.username=docs
          hibernate.connection.password=docs
          hibernate.hbm2ddl.auto=
          hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
          hibernate.show_sql=false
          hibernate.format_sql=false
          hibernate.max_fetch_depth=5
          hibernate.cache.use_second_level_cache=false
          hibernate.connection.initial_pool_size=1
          hibernate.connection.pool_size=10
          hibernate.connection.pool_validation_interval=5
          PROPS

      # Install the upstream modules the docs-web tests depend on, then run only the
      # docs-web suite against Postgres (the -pl docs-web reactor build needs the
      # docs-core / docs-web-common artifacts present).
      - name: Install docs-core and docs-web-common
        run: ./mvnw --batch-mode install -DskipTests -pl docs-core,docs-web-common -am

      - name: Run docs-web REST tests on PostgreSQL
        run: ./mvnw --batch-mode test -pl docs-web

  docs-importer:
    # Smoke-check the standalone Node.js bulk importer: install from the
    # lockfile and verify the entry parses and its dependencies still resolve
    # after the request -> fetch migration (ADR-0007 / RR-56).
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install importer dependencies
        run: cd docs-importer && npm ci

      - name: Smoke-test importer
        run: cd docs-importer && npm test

  build:
    runs-on: ubuntu-latest
    needs: [test, test-postgres, test-web-postgres, docs-importer]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Check version consistency (tag == pom == package.json)
        if: startsWith(github.ref, 'refs/tags/v')
        run: bash scripts/check-version-consistency.sh "${GITHUB_REF_NAME}"

      - name: Check OpenAPI spec parity (/apidoc)
        run: node scripts/check-openapi-parity.mjs

      - name: Install frontend dependencies
        run: cd docs-web/src/main/webapp && npm ci

      - name: Check i18n key parity
        run: cd docs-web/src/main/webapp && npm run i18n:check

      - name: Lint frontend (i18n no-raw-text)
        run: cd docs-web/src/main/webapp && npm run lint

      - name: Run frontend unit tests
        run: cd docs-web/src/main/webapp && npm run test:unit

      - name: Build with Maven
        run: ./mvnw --batch-mode -Pprod clean install -DskipTests

      - name: Upload war artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: docs-web.war
          path: docs-web/target/docs*.war

  e2e:
    # End-to-end tests against the REAL production Docker image (embedded H2,
    # default admin/admin) driven by Playwright/Chromium via Teedy's NATIVE form
    # login — NOT Authelia (Authelia only fronts production). Reuses the war
    # artifact produced by `build` so the image is not rebuilt from Maven; the
    # image PUBLISH (docker job) gates on this passing.
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Download war artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: docs-web.war
          path: docs-web/target

      - name: Build e2e Docker image (amd64, load)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: teedy-e2e:local

      - name: Install e2e dependencies
        run: cd docs-web/src/main/webapp && npm ci

      - name: Install Playwright browser
        run: cd docs-web/src/main/webapp && npx playwright install --with-deps chromium

      - name: Run e2e suite (boots container, tears down)
        env:
          E2E_IMAGE: teedy-e2e:local
        run: bash scripts/e2e-run.sh

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report
          path: docs-web/src/main/webapp/playwright-report
          retention-days: 7

  e2e-visual:
    # Visual-regression gate. The committed *-linux.png baselines were generated in the
    # pinned Playwright JAMMY container (Ubuntu 22.04 fonts), NOT on this ubuntu-latest
    # (Noble) runner — different system fonts would flake a host pixel-diff. So this job
    # boots the SAME RC image the `e2e` job uses, then runs ONLY the @visual specs INSIDE
    # the jammy container (scripts/e2e-run.sh E2E_VISUAL_ONLY=1) — the exact OS/font
    # environment the baselines match. A visual diff fails this job. It runs on every
    # event the `e2e` job does (a real default-on gate) and blocks image publish (the
    # `docker` job needs it).
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Download war artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: docs-web.war
          path: docs-web/target

      - name: Build e2e Docker image (amd64, load)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: teedy-e2e:local

      - name: Install e2e dependencies
        run: cd docs-web/src/main/webapp && npm ci

      # No `npx playwright install` here: the @visual specs run INSIDE the jammy
      # Playwright container, which ships the matching browser. `npm ci` above provides
      # the OS-agnostic @playwright/test JS the mounted specs import.
      - name: Run visual gate (@visual specs in jammy container)
        env:
          E2E_IMAGE: teedy-e2e:local
          E2E_VISUAL_ONLY: "1"
        run: bash scripts/e2e-run.sh

      - name: Upload Playwright HTML report (visual)
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report-visual
          path: docs-web/src/main/webapp/playwright-report
          retention-days: 7

  e2e-harness:
    # Real-Chrome (CDP) smoke gate. A SECOND browser engine + driver: where the `e2e`
    # job drives Playwright's bundled Chromium, this drives the runner's real Google
    # Chrome over CDP via the browser-harness daemon, against the SAME RC image. Trimmed
    # to the checks GENUINELY UNIQUE to the real-Chrome harness (exact /api/app version
    # gate, admin account-sessions + monitoring content, the not-clipped +N overflow
    # layout probe, the authoritative XSS-inert read-back) plus the login prerequisite —
    # everything the Playwright desktop/mobile/visual suite already covers was removed
    # (overlap analysis: scripts/e2e-coverage-matrix.md, GitHub #76). No display is
    # needed: Chrome runs headless and the harness attaches over a websocket. A non-zero
    # harness exit fails this job. NOTE: this job is intentionally NON-GATING for now — it
    # runs on every push but does NOT block image publish (the `docker` job does not depend
    # on it yet). Once it has a track record of green runs on the real CI runner, promote it
    # to a publish gate by adding `e2e-harness` to the `docker` job's `needs` (GitHub #76).
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install browser-harness
        run: python -m pip install --upgrade "browser-harness==0.1.4"

      - name: Download war artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: docs-web.war
          path: docs-web/target

      - name: Build e2e Docker image (amd64, load)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: teedy-e2e:local

      # The runner's real Google Chrome (ubuntu-latest ships it preinstalled). Pinned via
      # setup-chrome for a stable, versioned binary — the harness attaches to it headless
      # over CDP (no display), mirroring how the `e2e` job provisions Playwright's browser.
      - name: Set up Google Chrome
        uses: browser-actions/setup-chrome@b94431e051d1c52dcbe9a7092a4f10f827795416 # v2.1.0
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Run browser-harness smoke suite (boots container, tears down)
        env:
          E2E_IMAGE: teedy-e2e:local
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: bash scripts/e2e-harness-run.sh

      - name: Upload harness artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: browser-harness-artifacts
          path: e2e-artifacts/browser-harness
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    # e2e-harness is intentionally NOT here yet — it runs non-gating until it has a
    # green track record on the real CI runner, then gets promoted to a publish gate (#76).
    needs: [build, e2e, e2e-visual]
    # Publish images only from publishable refs; never build/push on PRs or fix/** branches.
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' ||
       startsWith(github.ref, 'refs/heads/release/') ||
       startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Publish policy (three-way branch/tag split):
      #   - pre-release tag v*-* (name contains a hyphen: -rc.N / -beta.N / -alpha.N):
      #                PUBLISH, single-arch amd64 ONLY, as a GitHub *pre-release*. Never moves
      #                `latest`. Slow arm64 QEMU is skipped — RC checkpoints ship amd64 only.
      #   - final tag v* (no hyphen): PUBLISH, multi-arch (amd64+arm64) — the distributable
      #                release image. Does not move `latest` (matches prior behavior).
      #   - main    : PUBLISH, multi-arch — the rolling `latest`.
      #   - release/*, fix/*: smoke-boot ONLY (single-arch amd64), never published — RC images
      #                are gated behind a version tag, and cross-arch emulation is skipped there.
      - name: Resolve publish policy
        id: cfg
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "${GITHUB_REF}" == refs/tags/v* && "${tag}" == *-* ]]; then
            # Pre-release tag (vX.Y.Z-rc.N / -beta.N / -alpha.N): amd64-only, GitHub pre-release, no latest.
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* || "${GITHUB_REF}" == refs/heads/main ]]; then
            # Final release tag or main: multi-arch. `latest` only on main (unchanged).
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
              echo "latest=true" >> "$GITHUB_OUTPUT"
            else
              echo "latest=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # release/**, fix/**: smoke-boot only, never published.
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download war artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: docs-web.war
          path: docs-web/target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Runtime smoke test on EVERY publishable ref (incl. release/* RC pushes): build a
      # single-arch amd64 image, load it, boot the container standalone (embedded H2 — no
      # DATABASE_URL), and assert a real API route serves. Catches a green build that produces
      # an image that cannot actually start (broken WAR, bad Jetty wiring, dangling
      # ServiceLoader descriptor, missing runtime dep). No registry access needed.
      - name: Build smoke-test image (amd64, load)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: teedy-smoke-test:local

      - name: Smoke-test the container
        run: bash scripts/docker-smoke-test.sh teedy-smoke-test:local

      # --- Publish (tags + main only) --------------------------------------------------
      # QEMU/binfmt is only needed to cross-compile arm64, i.e. only when we publish.
      - name: Set up QEMU
        if: steps.cfg.outputs.publish == 'true'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Log in to GHCR
        if: steps.cfg.outputs.publish == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: metadata
        if: steps.cfg.outputs.publish == 'true'
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ steps.cfg.outputs.latest == 'true' }}

      - name: Build and push (multi-arch)
        if: steps.cfg.outputs.publish == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ steps.cfg.outputs.platforms }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
