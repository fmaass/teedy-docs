name: Build and Publish

on:
  push:
    branches: [main, "release/**", "fix/**"]
    tags: [v*]
  pull_request:
    branches: [main, "release/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get -y -q --no-install-recommends install ffmpeg mediainfo tesseract-ocr tesseract-ocr-deu

      - name: Run tests
        run: ./mvnw --batch-mode test

  test-postgres:
    # Run the docs-core suite (DbOpenHelper migration bootstrap + DAO/native-query tests)
    # against a real PostgreSQL 17, catching the H2-passes/Postgres-fails class of bug
    # (native-SQL column typos, case-sensitivity, migration statements) that H2 cannot.
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: docs
          POSTGRES_PASSWORD: docs
          POSTGRES_DB: docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get -y -q --no-install-recommends install ffmpeg mediainfo tesseract-ocr tesseract-ocr-deu

      - name: Point docs-core tests at PostgreSQL
        run: |
          cat > docs-core/src/test/resources/hibernate.properties <<'PROPS'
          hibernate.connection.driver_class=org.postgresql.Driver
          hibernate.connection.url=jdbc:postgresql://localhost:5432/docs
          hibernate.connection.username=docs
          hibernate.connection.password=docs
          hibernate.hbm2ddl.auto=
          hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
          hibernate.show_sql=false
          hibernate.format_sql=false
          hibernate.max_fetch_depth=5
          hibernate.cache.use_second_level_cache=false
          hibernate.connection.initial_pool_size=1
          hibernate.connection.pool_size=10
          hibernate.connection.pool_validation_interval=5
          PROPS

      - name: Run docs-core tests on PostgreSQL
        run: ./mvnw --batch-mode test -pl docs-core

  build:
    runs-on: ubuntu-latest
    needs: [test, test-postgres]

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: cd docs-web/src/main/webapp && npm ci

      - name: Check i18n key parity
        run: cd docs-web/src/main/webapp && npm run i18n:check

      - name: Lint frontend (i18n no-raw-text)
        run: cd docs-web/src/main/webapp && npm run lint

      - name: Run frontend unit tests
        run: cd docs-web/src/main/webapp && npm run test:unit

      - name: Build with Maven
        run: ./mvnw --batch-mode -Pprod clean install -DskipTests

      - name: Upload war artifact
        uses: actions/upload-artifact@v6
        with:
          name: docs-web.war
          path: docs-web/target/docs*.war

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    # Publish images only from publishable refs; never build/push on PRs or fix/** branches.
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' ||
       startsWith(github.ref, 'refs/heads/release/') ||
       startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Download war artifact
        uses: actions/download-artifact@v7
        with:
          name: docs-web.war
          path: docs-web/target

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value={{branch}}-rc-{{sha}},enable=${{ startsWith(github.ref, 'refs/heads/release/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
