name: Scheduled Regression

# Nightly (and on-demand) full-regression MONITOR — NOT a merge gate.
#
# Builds the production WAR + Docker image from a chosen ref (default: the
# repository default branch `main`, i.e. the released/shipped state), then runs
# the same end-to-end suites the `build-deploy.yml` publish pipeline gates on:
#   - `e2e`         : Playwright FUNCTIONAL suite (desktop + mobile) via scripts/e2e-run.sh
#   - `e2e-visual`  : @visual pixel-regression specs in the pinned Playwright jammy
#                     container (scripts/e2e-run.sh E2E_VISUAL_ONLY=1)
#   - `e2e-harness` : trimmed real-Chrome (CDP) browser-harness smoke (scripts/e2e-harness-run.sh)
#
# This workflow is a monitor: it gates NOTHING (no other workflow `needs` it, no
# branch protection references it). Its only side effect on failure is to file (or
# comment on) a `regression-failure` tracking issue so a silent regression in the
# shipped app surfaces as a ticket. The boot/build steps mirror build-deploy.yml's
# `build` / `e2e` / `e2e-visual` / `e2e-harness` jobs exactly (same action SHAs,
# same war-artifact reuse, same container-network approach).

on:
  schedule:
    # 03:12 UTC nightly — off-peak, and off the top of the hour to avoid the
    # cron-scheduling thundering herd GitHub warns about.
    - cron: "12 3 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to run the regression against. Defaults to the repository default branch."
        required: false
        default: ""

# Read-only by default; the issue-filing job elevates `issues: write` locally.
permissions:
  contents: read

# One scheduled regression at a time — a manual dispatch landing mid-nightly (or a
# slow run overrunning into the next night) would otherwise double-build and race
# the de-dup issue search.
concurrency:
  group: regression-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # Resolve the ref under test ONCE so every downstream checkout uses the same value.
  # workflow_dispatch may override it; schedule/empty falls back to the default branch.
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.pick.outputs.ref }}
    steps:
      - name: Pick the ref under test
        id: pick
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_REF}" ]; then
            ref="${INPUT_REF}"
          else
            ref="${DEFAULT_BRANCH}"
          fi
          echo "Regression will run against ref: ${ref}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

  build:
    # Build the production WAR from the resolved ref, once, and hand it to the e2e
    # jobs as an artifact (mirrors build-deploy.yml's `build` job — the Dockerfile
    # COPYs this pre-built WAR rather than compiling inside the image).
    runs-on: ubuntu-latest
    needs: [resolve-ref]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: cd docs-web/src/main/webapp && npm ci

      - name: Build with Maven
        run: ./mvnw --batch-mode -Pprod clean install -DskipTests

      - name: Upload war artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: docs-web.war
          path: docs-web/target/docs*.war

  codeql:
    runs-on: ubuntu-latest
    needs: [resolve-ref]
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@cdefb33c0f6224e58673d9004f47f7cb3e328b89 # v4.31.10
        with:
          languages: java, javascript-typescript

      - name: Compile Java for CodeQL
        run: ./mvnw --batch-mode -DskipTests compile

      - name: Analyze and upload SARIF
        uses: github/codeql-action/analyze@cdefb33c0f6224e58673d9004f47f7cb3e328b89 # v4.31.10
        with:
          output: ${{ runner.temp }}/codeql-sarif
          upload: true
          wait-for-processing: true

      - name: Gate new high-severity CodeQL findings
        run: python3 scripts/codeql-gate.py "${{ runner.temp }}/codeql-sarif"

  codeql-expiry:
    # Reminder MONITOR for the CodeQL triage baseline's re-triage deadline. It warns
    # (a workflow annotation + a tracking issue) while the earliest `expires` date in
    # .github/baselines/codeql-known.json is inside the lead window, so the re-triage
    # is planned work rather than a surprise red `codeql` gate on the expiry date. The
    # `codeql` gate above is what actually enforces expiry.
    #
    # Failure policy is deliberate and split:
    #   * The countdown itself never reds the build — an approaching or past expiry is a
    #     warning, and the issue-filing mechanics are wrapped in continue-on-error so a
    #     transient GitHub API failure (rate limit, issues disabled, blip) can never red
    #     this monitor.
    #   * A STRUCTURAL problem in the baseline (unreadable/invalid JSON, an entry with no
    #     or a malformed `expires`) is a real config error, so the check step is allowed
    #     to fail loudly (checker exit 2) — that is not the countdown path.
    runs-on: ubuntu-latest
    needs: [resolve-ref]
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      # A malformed baseline (checker exit 2) is a genuine config error and is allowed to
      # fail this step; an approaching/past expiry is exit 0 with a status output.
      - name: Check CodeQL baseline expiry
        id: check
        run: python3 scripts/check-codeql-expiry.py --lead-days 45

      # continue-on-error: the annotation from the step above has already landed; a GitHub
      # API failure while filing the reminder issue must never red the build.
      - name: Open or update the re-triage reminder issue
        if: steps.check.outputs.status == 'warn' || steps.check.outputs.status == 'expired'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS: ${{ steps.check.outputs.status }}
          MIN_EXPIRY: ${{ steps.check.outputs.min_expiry }}
          DAYS_REMAINING: ${{ steps.check.outputs.days_remaining }}
          SUMMARY: ${{ steps.check.outputs.summary }}
        run: |
          set -euo pipefail

          LABEL="codeql-retriage-due"

          # Ensure the tracking label exists (idempotent; tolerate "already exists").
          gh label create "${LABEL}" \
            --color FBCA04 \
            --description "Automated: the CodeQL triage baseline is nearing or past its re-triage deadline" \
            --repo "${REPO}" 2>/dev/null || true

          DATE_UTC="$(date -u '+%Y-%m-%d %H:%M UTC')"

          BODY_FILE="$(mktemp)"
          cat > "${BODY_FILE}" <<EOF
          ${SUMMARY}

          - **Earliest baseline expiry:** \`${MIN_EXPIRY}\`
          - **Days remaining:** ${DAYS_REMAINING}
          - **Checked:** ${DATE_UTC} — ${RUN_URL}

          On the expiry date, \`scripts/codeql-gate.py\` fails every build until each entry
          in \`.github/baselines/codeql-known.json\` is re-triaged. Re-verify that each
          entry's compensating control still holds and update its \`expires\` date (rather
          than blanket-extending the dates), then close this issue.

          _Filed automatically by the \`Scheduled Regression\` workflow. Subsequent checks
          comment on this issue rather than opening a duplicate._
          EOF

          # DE-DUP: comment on an existing open reminder rather than opening a new one.
          existing="$(gh issue list \
            --repo "${REPO}" \
            --label "${LABEL}" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${existing}" ]; then
            echo "Open ${LABEL} issue #${existing} exists — commenting instead of opening a duplicate."
            gh issue comment "${existing}" --repo "${REPO}" --body-file "${BODY_FILE}"
          else
            echo "No open ${LABEL} issue — opening a new one."
            gh issue create \
              --repo "${REPO}" \
              --title "CodeQL triage baseline re-triage due — expires ${MIN_EXPIRY}" \
              --label "${LABEL}" \
              --body-file "${BODY_FILE}"
          fi

  trivy-fs:
    runs-on: ubuntu-latest
    needs: [resolve-ref]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Validate and materialize Trivy exceptions
        env:
          TRIVY_IGNORE_FILE: ${{ runner.temp }}/trivy-fs.ignore
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import os
          from pathlib import Path

          required = {
              "id", "finding", "reason", "owner", "introduced", "expires",
              "compensating_control", "removal_issue",
          }
          baseline = json.loads(Path(".github/baselines/trivy-exceptions.json").read_text())
          if set(baseline.get("schema", {}).get("required", [])) != required:
              raise SystemExit("Trivy exception file does not declare the required schema")
          exceptions = baseline.get("exceptions")
          if not isinstance(exceptions, list):
              raise SystemExit("Trivy exceptions must be an array")
          ids = []
          for index, exception in enumerate(exceptions):
              missing = required - set(exception)
              if missing:
                  raise SystemExit(f"exception {index} lacks fields: {sorted(missing)}")
              if not exception["owner"] or not exception["expires"]:
                  raise SystemExit(f"exception {exception['id']} lacks owner or expires")
              try:
                  expiry = datetime.date.fromisoformat(exception["expires"])
              except ValueError as error:
                  raise SystemExit(f"exception {exception['id']} has invalid expires date: {error}")
              if expiry < datetime.date.today():
                  raise SystemExit(f"exception {exception['id']} expired on {expiry}")
              ids.append(exception["id"])
          ignore_file = Path(os.environ["TRIVY_IGNORE_FILE"])
          ignore_file.write_text("\n".join(ids) + ("\n" if ids else ""))
          print(f"Materialized {len(ids)} governed Trivy fs exception(s) in {ignore_file}:")
          print(ignore_file.read_text(), end="")
          PY

      - name: Scan repository dependencies
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace:ro" \
            -v "${{ runner.temp }}/trivy-fs.ignore:/scan/trivy-fs.ignore:ro" \
            -v "trivy-cache:/root/.cache/trivy" \
            aquasec/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c \
            fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --no-progress \
            --ignorefile /scan/trivy-fs.ignore /workspace
          # aquasec/trivy 0.69.3, pinned by multi-platform image digest.

  candidate-image:
    runs-on: ubuntu-latest
    needs: [resolve-ref, build]
    outputs:
      digest: ${{ steps.candidate.outputs.digest }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Download war artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: docs-web.war
          path: docs-web/target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build candidate once (amd64 OCI archive)
        id: candidate
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: false
          provenance: false
          outputs: type=oci,dest=${{ runner.temp }}/candidate-image.oci.tar
          tags: teedy-candidate:local

      - name: Record candidate digest
        env:
          CANDIDATE_DIGEST: ${{ steps.candidate.outputs.digest }}
        run: |
          test -n "${CANDIDATE_DIGEST}"
          echo "${CANDIDATE_DIGEST}" > "${{ runner.temp }}/candidate-image.digest"
          echo "Regression candidate: ${CANDIDATE_DIGEST}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload candidate OCI archive
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: candidate-image-oci
          path: |
            ${{ runner.temp }}/candidate-image.oci.tar
            ${{ runner.temp }}/candidate-image.digest
          if-no-files-found: error

  trivy-image:
    runs-on: ubuntu-latest
    needs: [resolve-ref, candidate-image]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Download candidate OCI archive
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: candidate-image-oci
          path: ${{ runner.temp }}

      - name: Validate and materialize Trivy exceptions
        env:
          TRIVY_IGNORE_FILE: ${{ runner.temp }}/trivy-image.ignore
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import os
          from pathlib import Path

          required = {
              "id", "finding", "reason", "owner", "introduced", "expires",
              "compensating_control", "removal_issue",
          }
          baseline = json.loads(Path(".github/baselines/trivy-image-exceptions.json").read_text())
          if set(baseline.get("schema", {}).get("required", [])) != required:
              raise SystemExit("Trivy exception file does not declare the required schema")
          exceptions = baseline.get("exceptions")
          if not isinstance(exceptions, list):
              raise SystemExit("Trivy exceptions must be an array")
          ids = []
          for index, exception in enumerate(exceptions):
              missing = required - set(exception)
              if missing:
                  raise SystemExit(f"exception {index} lacks fields: {sorted(missing)}")
              if not exception["owner"] or not exception["expires"]:
                  raise SystemExit(f"exception {exception['id']} lacks owner or expires")
              try:
                  expiry = datetime.date.fromisoformat(exception["expires"])
              except ValueError as error:
                  raise SystemExit(f"exception {exception['id']} has invalid expires date: {error}")
              if expiry < datetime.date.today():
                  raise SystemExit(f"exception {exception['id']} expired on {expiry}")
              ids.append(exception["id"])
          ignore_file = Path(os.environ["TRIVY_IGNORE_FILE"])
          ignore_file.write_text("\n".join(ids) + ("\n" if ids else ""))
          print(f"Materialized {len(ids)} governed Trivy image exception(s) in {ignore_file}:")
          print(ignore_file.read_text(), end="")
          PY

      - name: Extract candidate OCI layout
        run: |
          mkdir "${{ runner.temp }}/candidate-image-oci"
          tar -xf "${{ runner.temp }}/candidate-image.oci.tar" \
            -C "${{ runner.temp }}/candidate-image-oci"
          test -s "${{ runner.temp }}/candidate-image-oci/index.json"

      - name: Scan candidate image
        run: |
          docker run --rm \
            -v "${{ runner.temp }}:/scan:ro" \
            -v "trivy-cache:/root/.cache/trivy" \
            aquasec/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c \
            image --input /scan/candidate-image-oci --scanners vuln \
            --severity HIGH,CRITICAL --exit-code 1 --no-progress \
            --ignorefile /scan/trivy-image.ignore
          # aquasec/trivy 0.69.3, pinned by multi-platform image digest.

  sbom:
    runs-on: ubuntu-latest
    needs: [candidate-image]

    steps:
      - name: Download candidate OCI archive
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: candidate-image-oci
          path: ${{ runner.temp }}

      - name: Extract candidate OCI layout
        run: |
          mkdir "${{ runner.temp }}/candidate-image-oci"
          tar -xf "${{ runner.temp }}/candidate-image.oci.tar" \
            -C "${{ runner.temp }}/candidate-image-oci"
          test -s "${{ runner.temp }}/candidate-image-oci/index.json"

      - name: Generate candidate CycloneDX SBOM
        run: |
          docker run --rm \
            -v "${{ runner.temp }}:/scan" \
            -v "trivy-cache:/root/.cache/trivy" \
            aquasec/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c \
            image --input /scan/candidate-image-oci --format cyclonedx \
            --output /scan/candidate-image.cdx.json --exit-code 0 --no-progress
          # aquasec/trivy 0.69.3, pinned by multi-platform image digest.

      - name: Validate candidate CycloneDX SBOM
        run: |
          test -s "${{ runner.temp }}/candidate-image.cdx.json"
          jq -e '.bomFormat == "CycloneDX"' "${{ runner.temp }}/candidate-image.cdx.json" > /dev/null

      - name: Upload candidate SBOM
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: candidate-image-sbom
          path: ${{ runner.temp }}/candidate-image.cdx.json
          if-no-files-found: error

  e2e:
    # Playwright FUNCTIONAL suite (desktop + mobile projects) against the real prod
    # image (embedded H2, admin/admin), booted + torn down by scripts/e2e-run.sh —
    # exactly build-deploy.yml's `e2e` job.
    runs-on: ubuntu-latest
    needs: [resolve-ref, candidate-image]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Download candidate OCI archive
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: candidate-image-oci
          path: ${{ runner.temp }}

      - name: Load the exact candidate image
        run: |
          sudo apt-get update
          sudo apt-get -y install skopeo
          skopeo copy oci-archive:${{ runner.temp }}/candidate-image.oci.tar docker-daemon:teedy-e2e:local
          echo "Loaded candidate ${{ needs.candidate-image.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Install e2e dependencies
        run: cd docs-web/src/main/webapp && npm ci

      - name: Install Playwright browser
        run: cd docs-web/src/main/webapp && npx playwright install --with-deps chromium

      - name: Run e2e suite (boots container, tears down)
        env:
          E2E_IMAGE: teedy-e2e:local
          # The nightly monitor also runs the quarantined @flaky specs (excluded from the
          # release-gating e2e job) so their flakiness stays visible for triage.
          E2E_INCLUDE_FLAKY: "1"
        run: bash scripts/e2e-run.sh

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report
          path: docs-web/src/main/webapp/playwright-report
          retention-days: 7

  e2e-visual:
    # @visual pixel-regression gate: boots the SAME RC image and runs ONLY the
    # @visual specs INSIDE the pinned Playwright jammy container (the exact OS/font
    # environment the committed *-linux.png baselines match) — build-deploy.yml's
    # `e2e-visual` job.
    runs-on: ubuntu-latest
    needs: [resolve-ref, candidate-image]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Download candidate OCI archive
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: candidate-image-oci
          path: ${{ runner.temp }}

      - name: Load the exact candidate image
        run: |
          sudo apt-get update
          sudo apt-get -y install skopeo
          skopeo copy oci-archive:${{ runner.temp }}/candidate-image.oci.tar docker-daemon:teedy-e2e:local
          echo "Loaded candidate ${{ needs.candidate-image.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Install e2e dependencies
        run: cd docs-web/src/main/webapp && npm ci

      # No `npx playwright install`: the @visual specs run INSIDE the jammy Playwright
      # container, which ships the matching browser. `npm ci` above provides the
      # OS-agnostic @playwright/test JS the mounted specs import.
      - name: Run visual gate (@visual specs in jammy container)
        env:
          E2E_IMAGE: teedy-e2e:local
          E2E_VISUAL_ONLY: "1"
        run: bash scripts/e2e-run.sh

      - name: Upload Playwright HTML report (visual)
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report-visual
          path: docs-web/src/main/webapp/playwright-report
          retention-days: 7

  e2e-harness:
    # Real-Chrome (CDP) browser-harness smoke suite against the SAME RC image —
    # build-deploy.yml's `e2e-harness` job. Non-gating there; here it is simply one
    # more regression signal that feeds the failure ticket.
    runs-on: ubuntu-latest
    needs: [resolve-ref, candidate-image]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      # Derive the harness version gate's expectation from the checked-out root pom.xml
      # (same extraction idiom as scripts/check-version-consistency.sh) so the gate always
      # matches whatever ref is building — never a hardcoded default (GitHub #76/#81).
      - name: Derive expected app version from pom.xml
        run: |
          pom_version="$(grep -m1 -oE '<version>[^<]+</version>' pom.xml | sed -E 's/<\/?version>//g')"
          if [ -z "${pom_version}" ]; then
            echo "Could not read <version> from pom.xml" >&2
            exit 1
          fi
          echo "E2E_EXPECT_VERSION=${pom_version}" >> "$GITHUB_ENV"

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install browser-harness
        run: python -m pip install --upgrade "browser-harness==0.1.4"

      - name: Download candidate OCI archive
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: candidate-image-oci
          path: ${{ runner.temp }}

      - name: Load the exact candidate image
        run: |
          sudo apt-get update
          sudo apt-get -y install skopeo
          skopeo copy oci-archive:${{ runner.temp }}/candidate-image.oci.tar docker-daemon:teedy-e2e:local
          echo "Loaded candidate ${{ needs.candidate-image.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Google Chrome
        uses: browser-actions/setup-chrome@b94431e051d1c52dcbe9a7092a4f10f827795416 # v2.1.0
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Run browser-harness smoke suite (boots container, tears down)
        env:
          E2E_IMAGE: teedy-e2e:local
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: bash scripts/e2e-harness-run.sh

      - name: Upload harness artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: browser-harness-artifacts
          path: e2e-artifacts/browser-harness
          retention-days: 7

  report-failure:
    # AUTO-TICKETING (P15): if ANY of the build/e2e/visual/harness jobs failed, open
    # a `regression-failure` tracking issue — or, if one is already OPEN, comment on
    # it instead (de-dup, so a run of red nights can't spam a pile of duplicates).
    #
    # `if: failure()` fires when at least one job in `needs` failed OR was cancelled;
    # on an all-green run this job is skipped and no issue is touched.
    runs-on: ubuntu-latest
    needs: [resolve-ref, build, codeql, trivy-fs, candidate-image, trivy-image, sbom, e2e, e2e-visual, e2e-harness]
    if: failure()
    permissions:
      contents: read
      issues: write

    steps:
      - name: Open or update the regression-failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF_UNDER_TEST: ${{ needs.resolve-ref.outputs.ref }}
          # Per-job results so the ticket names WHICH suite regressed.
          R_BUILD: ${{ needs.build.result }}
          R_CODEQL: ${{ needs.codeql.result }}
          R_TRIVY_FS: ${{ needs.trivy-fs.result }}
          R_CANDIDATE: ${{ needs.candidate-image.result }}
          R_TRIVY_IMAGE: ${{ needs.trivy-image.result }}
          R_SBOM: ${{ needs.sbom.result }}
          R_E2E: ${{ needs.e2e.result }}
          R_VISUAL: ${{ needs.e2e-visual.result }}
          R_HARNESS: ${{ needs.e2e-harness.result }}
        run: |
          set -euo pipefail

          LABEL="regression-failure"

          # Ensure the tracking label exists (idempotent; the repo ships `bug` but not
          # this one). `gh label create` errors if it already exists, so tolerate that.
          gh label create "${LABEL}" \
            --color B60205 \
            --description "Automated: a scheduled regression run failed" \
            --repo "${REPO}" 2>/dev/null || true

          # Summarize which jobs failed (a job is "failed" unless it succeeded or was
          # skipped — cancelled/timed_out count as failures worth a ticket).
          failed=""
          for entry in \
            "build=${R_BUILD}" \
            "codeql=${R_CODEQL}" \
            "trivy-fs=${R_TRIVY_FS}" \
            "candidate-image=${R_CANDIDATE}" \
            "trivy-image=${R_TRIVY_IMAGE}" \
            "sbom=${R_SBOM}" \
            "e2e=${R_E2E}" \
            "e2e-visual=${R_VISUAL}" \
            "e2e-harness=${R_HARNESS}"; do
            name="${entry%%=*}"
            result="${entry#*=}"
            if [ "${result}" != "success" ] && [ "${result}" != "skipped" ]; then
              failed="${failed} - \`${name}\`: ${result}"$'\n'
            fi
          done
          if [ -z "${failed}" ]; then
            failed=" - (no individual job reported a non-success result; see the run for details)"$'\n'
          fi

          DATE_UTC="$(date -u '+%Y-%m-%d %H:%M UTC')"

          BODY_FILE="$(mktemp)"
          cat > "${BODY_FILE}" <<EOF
          The scheduled regression run failed on **${DATE_UTC}**.

          - **Ref under test:** \`${REF_UNDER_TEST}\`
          - **Failed run:** ${RUN_URL}

          **Failing job(s):**
          ${failed}
          **Artifacts** (attached to the failed run above — open the run, scroll to *Artifacts*):
          - \`playwright-report\` — functional Playwright HTML report (desktop + mobile)
          - \`playwright-report-visual\` — visual-diff report (expected/actual/diff PNGs for any \`@visual\` mismatch)
          - \`browser-harness-artifacts\` — real-Chrome harness output

          _Filed automatically by the \`Scheduled Regression\` workflow. This issue tracks
          the recurring signal — subsequent failures are appended as comments rather than
          new issues. Close it once the regression is resolved and a run goes green._
          EOF

          # DE-DUP: if an OPEN issue with this label already exists, comment on the
          # newest one instead of opening a duplicate. `--json number -q` yields the
          # bare issue number (empty string when none open).
          existing="$(gh issue list \
            --repo "${REPO}" \
            --label "${LABEL}" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${existing}" ]; then
            echo "Open ${LABEL} issue #${existing} exists — commenting instead of opening a duplicate."
            {
              echo "Another scheduled regression run failed on **${DATE_UTC}**."
              echo
              echo "- **Ref under test:** \`${REF_UNDER_TEST}\`"
              echo "- **Failed run:** ${RUN_URL}"
              echo
              echo "**Failing job(s):**"
              printf '%s' "${failed}"
            } > "${BODY_FILE}"
            gh issue comment "${existing}" --repo "${REPO}" --body-file "${BODY_FILE}"
          else
            echo "No open ${LABEL} issue — opening a new one."
            gh issue create \
              --repo "${REPO}" \
              --title "Scheduled regression failed — ${DATE_UTC}" \
              --label "${LABEL}" \
              --label "bug" \
              --body-file "${BODY_FILE}"
          fi
