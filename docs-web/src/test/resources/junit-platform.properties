# Auto-register the ServiceLoader-provided Jupiter extensions in
# META-INF/services/org.junit.jupiter.api.extension.Extension. This enables
# PostgresSchemaResetExtension, which performs the seed-preserving per-class
# schema reset when the docs-web REST suite runs against PostgreSQL (CI). It is
# a no-op on the default H2 datasource, so local `mvn test` is unaffected.
junit.jupiter.extensions.autodetection.enabled=true
