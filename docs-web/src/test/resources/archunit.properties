# Freeze store for the two legacy ratchets (rules 7/8: rest.resource -> core.dao, and
# rest.resource -> ThreadLocalContext). The store is COMMITTED under version control so the
# shrink-only baselines are review-visible. allowStoreCreation is FALSE: the store exists; a missing
# store must FAIL the build (a deleted store silently re-snapshotting would grandfather new
# violations). Seeding a store for a NEW frozen rule requires a one-run flip of this flag, reviewed
# with the resulting store files. refreeze stays false so a NEW violation fails instead of being
# recorded.
freeze.store.default.path=src/test/resources/archunit-freeze
freeze.store.default.allowStoreCreation=false
freeze.refreeze=false
